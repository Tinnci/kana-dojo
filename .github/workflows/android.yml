name: Android

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    name: Test and assemble debug APK
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out sources
        uses: actions/checkout@v7

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21

      - name: Set up Android SDK
        uses: android-actions/setup-android@v4

      - name: Install Android platform and build tools
        run: sdkmanager "platforms;android-37.1" "build-tools;37.0.0"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Run unit tests and assemble debug
        run: ./gradlew checkCiSdkVersions :app:testDebugUnitTest :app:assembleDebug
